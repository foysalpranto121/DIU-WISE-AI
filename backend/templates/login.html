<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | DIU WISE</title>
    <!-- Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <div style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
      <button class="theme-toggle-btn" id="theme-toggle-btn" aria-label="Toggle Theme" title="Toggle Light/Dark Mode">
        <svg class="theme-icon-moon" viewBox="0 0 24 24"><path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-8.9 8.2-9.8.5-.1 1 .2 1.2.7.2.5 0 1.1-.4 1.4-1.9 1.4-3 3.6-3 6 0 4.1 3.4 7.5 7.5 7.5 2.4 0 4.6-1.1 6-3 .3-.4.9-.6 1.4-.4.5.2.8.7.7 1.2-.9 4.7-5 8.2-9.8 8.2z"/></svg>
        <svg class="theme-icon-sun" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
      </button>
    </div>
    <main class="auth-wrap">
      <section class="panel auth-panel glass-panel">
        <div class="logo-icon" style="margin: 0 auto 16px;"></div>
        <h1>DIU WISE</h1>
        <p>AI-Powered Student Wellness & Intelligence</p>
        
        <div class="auth-form mt-4">
          <input id="login-email" type="email" placeholder="Email Address" />
          <input id="login-password" type="password" placeholder="Password" />
          <button id="login-btn" class="btn btn-primary w-full">Sign In</button>
        </div>
        
        <div style="margin: 32px 0 16px; border-top: 1px solid var(--glass-border);"></div>
        
        <h3>Create an Account</h3>
        <div class="auth-form">
          <input id="reg-name" type="text" placeholder="Full Name" />
          <input id="reg-email" type="email" placeholder="Email Address" />
          <input id="reg-password" type="password" placeholder="Password (min 8 chars)" />
          <button id="register-btn" class="btn btn-secondary w-full">Register</button>
        </div>
        
        <p id="auth-message" class="mt-4" style="color: var(--danger);"></p>
        <p class="mt-4" style="font-size: 0.8rem; color: var(--text-secondary);">Default admin: admin@diu-wise.ai / Admin@12345</p>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
  </body>
</html>
