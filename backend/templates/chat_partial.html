<div class="chat-bubble" id="chat-bubble">
  <img src="/static/images/wellness_bot.png" alt="AI Assistant">
  <div class="notification-dot"></div>
</div>

<div class="chat-widget minimized" id="chat-widget">
  <div class="chat-header glass-panel" id="chat-header">
    <div class="chat-title">
      <div class="agent-avatar">
        <img src="/static/images/wellness_bot.png" class="agent-avatar-img" alt="AI">
      </div>
      <div>
        <h3>Wellness Assistant</h3>
        <span class="status-dot"></span><span class="status-text">Online</span>
      </div>
    </div>
    <button class="icon-btn close-btn" id="chat-close">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>
  
  <div class="chat-body" id="chat-body">
    <div class="chat-messages" id="chat-log">
      <div class="message ai-message">
        <div class="message-content">Hello {{ current_user.full_name }}! I'm here to support your wellness and academic journey. How are you feeling today?</div>
      </div>
    </div>
    
    <div class="chat-input-area">
      <div class="suggested-questions" id="suggested-questions">
        <button class="suggestion-chip">How are you feeling today?</button>
        <button class="suggestion-chip">I need study tips</button>
        <button class="suggestion-chip">I feel stressed</button>
      </div>
      <div class="chat-options">
        <label class="switch-label">
          <input type="checkbox" id="anonymous" class="switch-input" checked />
          <span class="switch-slider"></span>
          <span class="switch-text">Anonymous Mode</span>
        </label>
        <span class="agent-badge" id="current-agent-badge">Agent: Auto</span>
      </div>
      <div class="input-wrapper">
        <input id="chat-input" type="text" placeholder="Type your message..." autocomplete="off" />
        <button id="chat-send" class="send-btn">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
